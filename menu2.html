<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A NIGHTMARE</title>
    <link rel="icon" type="image/png" href="img/fredypng1.png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Quitamos el fondo negro que estorbaba */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* FONDO PRINCIPAL */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/menu fnaf.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            /* Brillo normal para que se vea tu foto tal cual es */
            filter: brightness(1); 
            animation: flicker 6s infinite;
        }

        /* CAPA DE ESTÁTICA SUTIL */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        .ui-container {
            margin-left: 5%;
            color: white;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
            animation: glitch 0.3s infinite;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        .menu-list li {
            margin: 15px 0;
        }

        .menu-list a {
            text-decoration: none;
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
            transition: 0.2s;
        }

        .menu-list a:hover {
            color: #ff0000; /* Rojo al pasar el mouse para que resalte */
            padding-left: 10px;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.9; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="background"></div>

    <div class="ui-container">
        <h1>A NIGHTMARE</h1>
        <ul class="menu-list">
            <li><a href="game.html">JUGAR NOCHE</a></li>
            <li><a href="game2.html" style="color: red; font-weight: bold; text-shadow: 0 0 10px #600;">MODO PESADILLA</a></li>
            <li><a href="extras2.html">EXTRAS</a></li>
            
        </ul>
    </div>

</body>
</html>
